name: Deploy to SiteGround

on:
  workflow_dispatch:
  schedule:
    - cron: "40 6 * * *"  # 10 min después del digest, en UTC

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily.json
        run: |
          python scripts/pipeline.py

      - name: Commit daily.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily.json
          git commit -m "chore: update daily digest" || exit 0
          git push

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SG_SSH_KEY }}
          ssh-passphrase: ${{ secrets.SG_SSH_PASSPHRASE }}

      - name: Deploy dist/ via rsync over SSH
        env:
          SG_HOST: ${{ secrets.SG_HOST }}
          SG_PORT: ${{ secrets.SG_PORT }}
          SG_USERNAME: ${{ secrets.SG_USERNAME }}
          SG_REMOTE_PATH: ${{ secrets.SG_REMOTE_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -p $SG_PORT -o StrictHostKeyChecking=no" \
            dist/ \
            $SG_USERNAME@$SG_HOST:$SG_REMOTE_PATH/