name: Deploy to SiteGround

on:
  workflow_dispatch:
  schedule:
    - cron: "40 6 * * *"  # 10 min después del digest, en UTC (ajústalo si quieres)

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily.json
        run: |
          python scripts/pipeline.py

      - name: Commit daily.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily.json
          git commit -m "chore: update daily digest" || exit 0
          git push

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      
      - name: Deploy dist/ via SCP (SSH key)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SG_HOST }}
          username: ${{ secrets.SG_USERNAME }}
          key: ${{ secrets.SG_SSH_KEY }}
          port: ${{ secrets.SG_PORT }}
          source: "dist/*"
          target: "${{ secrets.SG_REMOTE_PATH }}"
          strip_components: 1
          overwrite: true