name: Deploy to SiteGround

on:
  workflow_dispatch:
  schedule:
    - cron: "40 6 * * *"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily.json
        run: |
          python scripts/pipeline.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Load SSH key
        run: |
          echo "${{ secrets.SG_SSH_KEY_B64 }}" | base64 -d > /tmp/sg_key
          chmod 600 /tmp/sg_key
          eval "$(ssh-agent -s)"
          ssh-add /tmp/sg_key

      - name: Deploy dist/ via rsync over SSH
        env:
          SG_HOST: ${{ secrets.SG_HOST }}
          SG_PORT: ${{ secrets.SG_PORT }}
          SG_USERNAME: ${{ secrets.SG_USERNAME }}
          SG_REMOTE_PATH: ${{ secrets.SG_REMOTE_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -p $SG_PORT -o StrictHostKeyChecking=no" \
            dist/ \
            $SG_USERNAME@$SG_HOST:$SG_REMOTE_PATH/
