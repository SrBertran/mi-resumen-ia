name: Deploy to SiteGround

on:
  workflow_dispatch:
  schedule:
    - cron: "40 6 * * *"  # 10 min después del digest, en UTC (ajústalo si quieres)

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily.json
        run: |
          python scripts/pipeline.py

      - name: Commit daily.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily.json
          git commit -m "chore: update daily digest" || exit 0
          git push

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy dist/ via SFTP
        env:
          SG_HOST: ${{ secrets.SG_HOST }}
          SG_USERNAME: ${{ secrets.SG_USERNAME }}
          SG_PASSWORD: ${{ secrets.SG_PASSWORD }}
          SG_PORT: ${{ secrets.SG_PORT }}
          SG_REMOTE_PATH: ${{ secrets.SG_REMOTE_PATH }}
        run: |
          lftp -e "
          set sftp:auto-confirm yes;
          set ssl:verify-certificate no;

          # evita jobs eternos
          set net:timeout 20;
          set net:max-retries 2;
          set net:reconnect-interval-base 5;

          # log útil
          set cmd:trace yes;
          set cmd:trace-read yes;

          open -u $SG_USERNAME,$SG_PASSWORD sftp://$SG_HOST:$SG_PORT;

          # ver dónde estás subiendo
          pwd;
          ls -la;

          # subir solo dist con límites razonables
          mirror -R --delete --only-newer --parallel=2 --verbose dist $SG_REMOTE_PATH;

          # verifica que quedó index.html
          ls -la $SG_REMOTE_PATH;
          bye
          "